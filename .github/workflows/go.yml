name: go-mod-ci

on:
  push:
    branches:
      - master
      - dev

env:
  RELEASE_TAG: v0.0.0
  RELEASE_ZIP_FILE_NAME: golibrary

jobs:
  test-on-multiple-os:
    name: Test on multiple OS
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest , windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.tk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install Go dependencies
        run: go mod tidy

      - name: Run tests
        run: go fix ./...

  deploy-latest:
    name: Deploy Latest Release
    needs: test-on-multiple-os
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.tk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install dependencies
        run: go mod tidy

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0.0'

      - name: Install GitHub Changelog Generator
        run: gem install github_changelog_generator

      - name: Generate Changelog
        run: github_changelog_generator --user ${{ github.repository_owner }} --project ${{ github.event.repository.name }} --token ${{ secrets.tk }}

      # 删除旧tag 授权用你的tk
      - name: Delete old tag ${{ env.RELEASE_TAG }}
        run: |
          git config user.name CI
          git config user.email ci@github.com
          git fetch origin
          git tag -d ${{ env.RELEASE_TAG }} || true
          git push origin --delete ${{ env.RELEASE_TAG }} || true

      - name: Create new tag ${{ env.RELEASE_TAG }}
        run: |
          git tag ${{ env.RELEASE_TAG }}
          git push origin ${{ env.RELEASE_TAG }}

      - name: Create source code archive
        run: zip -r ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ env.RELEASE_TAG }}.zip . -x '.git/**'

      - name: Get commit info
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Delete old release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tag_pattern: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: golibrary Latest Stable
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ env.RELEASE_TAG }}.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}
