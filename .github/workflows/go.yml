name: go-mod-ci

on:
  push:
    branches:
      - master
      - dev

env:
  RELEASE_ZIP_FILE_NAME: golibrary

jobs:
  test-on-multiple-os:
    name: Test on multiple OS
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest , windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.tk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install Go dependencies
        run: go mod tidy

      - name: Run tests
        run: go fix ./...

  deploy-latest:
    name: Deploy Latest Release
    needs: test-on-multiple-os
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.tk }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install dependencies
        run: go mod tidy

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0.0'

      - name: Install GitHub Changelog Generator
        run: gem install github_changelog_generator

      - name: Generate Changelog
        run: github_changelog_generator --user ${{ github.repository_owner }} --project ${{ github.event.repository.name }} --token ${{ secrets.tk }}

      # 生成 Go 标准合法伪版本，语法绝对不出错
      - name: Build dynamic tag
        id: tag
        shell: bash
        run: |
          SHA_SHORT=${{ github.sha }}
          SHA_SHORT=${SHA_SHORT:0:12}
          DATE=$(date +%Y%m%d%H%M)
          echo "tag=v0.0.0-${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      # 清理旧历史伪版本tag
      - name: Delete old tags
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tag_pattern: v0.0.0-*
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}

      - name: Push new tag
        run: |
          git config user.name CI
          git config user.email ci@github.com
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Zip source
        run: zip -r ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ steps.tag.outputs.tag }}.zip . -x '.git/**'

      - name: Get commit info
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: golibrary Latest Stable
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ steps.tag.outputs.tag }}.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}
