name: go-mod-ci

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'

env:
  RELEASE_ZIP_FILE_NAME: golibrary

jobs:
  test-on-multiple-os:
    name: Test on multiple OS
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest , windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install Go dependencies
        run: go mod tidy

      - name: Run tests
        run: go fix ./...

  package-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-on-multiple-os
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install dependencies
        run: go mod tidy

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0.0'

      - name: Install GitHub Changelog Generator
        run: gem install github_changelog_generator

      - name: Generate Changelog
        run: github_changelog_generator --user ${{ github.repository_owner }} --project ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Create source code archive
        run: zip -r ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip . -x '.git/**'

      - name: Delete existing release for this tag
        run: |
            keep_latest: 0
            delete_tag_pattern: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}

  deploy-latest:
    name: Deploy Latest Release
    needs: test-on-multiple-os
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Install dependencies
        run: go mod tidy

      - name: Create source code archive
        run: zip -r ${{ env.RELEASE_ZIP_FILE_NAME }}-latest.zip . -x '.git/**'

      - name: Get commit info
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Delete existing latest release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tag_pattern: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: golibrary - Latest Build
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-latest.zip
          body: |
            golibrary - Latest Build
            
            Build Date: ${{ steps.commit_info.outputs.date }}
            Commit: ${{ steps.commit_info.outputs.commit }}
            Branch: ${{ github.ref_name }}
            
            This release is automatically updated with each successful build.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
